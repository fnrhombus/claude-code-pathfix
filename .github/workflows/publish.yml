name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Auto-publishes on every push to main when package.json's version is new
# on npm. Uses OIDC trusted publishing (already configured at
# https://www.npmjs.com/package/claude-code-pathfix/access), so no
# NPM_TOKEN secret is needed.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          if npm view claude-code-pathfix@$PACKAGE_VERSION version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "claude-code-pathfix@$PACKAGE_VERSION is already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "claude-code-pathfix@$PACKAGE_VERSION is new — will publish"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Typecheck
        if: steps.check.outputs.skip == 'false'
        run: npm run typecheck

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public
