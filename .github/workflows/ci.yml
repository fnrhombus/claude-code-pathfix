name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Smoke test — Windows path conversion
        if: runner.os == 'Windows'
        shell: bash
        run: |
          OUT=$(node -e "
            const input = JSON.stringify({
              session_id:'s', transcript_path:'/t', cwd:'/c',
              hook_event_name:'PreToolUse', permission_mode:'default',
              tool_use_id:'tu', tool_name:'Bash',
              tool_input:{command:'ls D:\\\\Users\\\\Tom\\\\file.txt'}
            });
            const {execSync} = require('child_process');
            const result = execSync('node dist/index.js', {input, encoding:'utf8'});
            process.stdout.write(result);
          ")
          echo "Output: $OUT"
          echo "$OUT" | grep -q '/d/Users/Tom/file.txt' || exit 1

      - name: Smoke test — non-Bash no-op
        shell: bash
        run: |
          OUT=$(node -e "
            const input = JSON.stringify({
              session_id:'s', transcript_path:'/t', cwd:'/c',
              hook_event_name:'PreToolUse', permission_mode:'default',
              tool_use_id:'tu', tool_name:'Edit',
              tool_input:{file_path:'/a', old_string:'x', new_string:'y'}
            });
            const {execSync} = require('child_process');
            const result = execSync('node dist/index.js', {input, encoding:'utf8'});
            process.stdout.write(result);
          ")
          [ -z "$OUT" ] || { echo "Expected empty output, got: $OUT"; exit 1; }
